<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Calculator - Dodo2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }

        input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        input[type="date"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .result-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .result-section.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 2.5em;
            font-weight: 700;
            color: #667eea;
            text-align: center;
        }

        .result-unit {
            text-align: center;
            color: #888;
            margin-top: 8px;
            font-size: 1em;
        }

        .error {
            color: #e74c3c;
            font-size: 0.9em;
            margin-top: 8px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .info-text {
            font-size: 0.85em;
            color: #999;
            margin-top: 15px;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Date Calculator</h1>
        <p class="subtitle">Calculate days between two dates</p>

        <form id="dateForm">
            <div class="form-group">
                <label for="startDate">Start Date</label>
                <input type="date" id="startDate" required>
            </div>

            <div class="form-group">
                <label for="endDate">End Date</label>
                <input type="date" id="endDate" required>
            </div>

            <button type="submit">Calculate</button>
            <div class="error" id="errorMessage"></div>
        </form>

        <div class="result-section" id="resultSection">
            <div class="result-label">Days Between Dates (Inclusive)</div>
            <div class="result-value" id="resultValue">0</div>
            <div class="result-unit">days</div>
        </div>

        <p class="info-text">💡 The calculation includes both the start and end dates.</p>
    </div>

    <script>
        const dateForm = document.getElementById('dateForm');
        const startDateInput = document.getElementById('startDate');
        const endDateInput = document.getElementById('endDate');
        const resultSection = document.getElementById('resultSection');
        const resultValue = document.getElementById('resultValue');
        const errorMessage = document.getElementById('errorMessage');

        // Set today's date as default for start date
        const today = new Date().toISOString().split('T')[0];
        startDateInput.value = today;

        dateForm.addEventListener('submit', (e) => {
            e.preventDefault();
            calculateDays();
        });

        // Calculate on date change as well
        startDateInput.addEventListener('change', calculateDays);
        endDateInput.addEventListener('change', calculateDays);

        function calculateDays() {
            const startDate = new Date(startDateInput.value);
            const endDate = new Date(endDateInput.value);

            errorMessage.classList.remove('show');
            resultSection.classList.remove('show');

            // Validation
            if (!startDateInput.value || !endDateInput.value) {
                return;
            }

            if (startDate > endDate) {
                errorMessage.textContent = '⚠️ Start date must be before or equal to end date';
                errorMessage.classList.add('show');
                return;
            }

            // Calculate difference in days (inclusive)
            const timeDifference = endDate - startDate;
            const daysDifference = Math.floor(timeDifference / (1000 * 60 * 60 * 24)) + 1; // +1 for inclusive

            resultValue.textContent = daysDifference.toLocaleString();
            resultSection.classList.add('show');
        }
    </script>
</body>
</html>
